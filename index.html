<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Jeffrey Epstein Basics In Education And Kidnapping!</title>
    <meta name="color-scheme" content="dark">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0b0d12;
        color: #e9ecff;
        font: 13px/1.5 ui-sans-serif, system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
      }
      #unity-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000;
        outline: none;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #loading {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(520px, calc(100vw - 40px));
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 14px;
        padding: 20px;
        pointer-events: auto;
        backdrop-filter: blur(8px);
      }
      #loading-title { font-weight: 700; margin-bottom: 6px; }
      #loading-sub { font-size: 12px; color: #a7afcf; margin-bottom: 14px; }
      #progress {
        height: 8px;
        border-radius: 999px;
        background: rgba(255,255,255,.07);
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7c5cff, #23c7ff);
        border-radius: 999px;
        transition: width .12s ease;
      }
      #percent {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 12px;
        color: #a7afcf;
      }
      #loading-percent { font-weight: 700; color: #e9ecff; }
      #fullscreen {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 20;
        pointer-events: auto;
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.1);
        color: #e9ecff;
        border-radius: 10px;
        padding: 8px 12px;
        font: 700 12px ui-sans-serif, system-ui, sans-serif;
        cursor: pointer;
      }
      #fullscreen:active { transform: translateY(1px); }
      #error { margin-top: 10px; font-size: 12px; color: #ffb4b4; display: none; white-space: pre-wrap; }
      @media (prefers-reduced-motion: reduce) { #progress-bar { transition: none; } }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="hud">
      <button id="fullscreen" type="button">Fullscreen</button>
      <div id="loading" role="status" aria-live="polite">
        <p id="loading-title">Loading…</p>
        <p id="loading-sub">Downloading game files</p>
        <div id="progress"><div id="progress-bar"></div></div>
        <div id="percent">
          <span id="loading-text">Starting…</span>
          <strong id="loading-percent">0%</strong>
        </div>
        <div id="error"></div>
      </div>
    </div>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loading = document.querySelector("#loading");
      const loadingText = document.querySelector("#loading-text");
      const loadingPercent = document.querySelector("#loading-percent");
      const progressBar = document.querySelector("#progress-bar");
      const fullscreenButton = document.querySelector("#fullscreen");
      const errorBox = document.querySelector("#error");

      const ASSET_BASE_URL = "https://cdn.jsdelivr.net/gh/reeyuki/jeffreybaldigame@main//";
      const BUILD_BASE_URL = ASSET_BASE_URL + "Build/";

      const FILES = {
        loaderJs: BUILD_BASE_URL + "jeffreyepsteinreeyuki.loader.js",
        frameworkJs: BUILD_BASE_URL + "jeffreyepsteinreeyuki.framework.js",
        dataChunks: [
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data00", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data01", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data02", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data03", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data04", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.data05", bytes: 4722872 },
        ],
        wasmChunks: [
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.wasm00", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.wasm01", bytes: 10485760 },
          { url: BUILD_BASE_URL + "jeffreyepsteinreeyuki.wasm02", bytes: 2622152 },
        ],
      };

      function setProgress(pct, text) {
        const clamped = Math.max(0, Math.min(100, pct));
        progressBar.style.width = clamped.toFixed(1) + "%";
        loadingPercent.textContent = Math.round(clamped) + "%";
        if (text) loadingText.textContent = text;
      }

      function showError(message) {
        errorBox.style.display = "block";
        errorBox.textContent = message;
      }

      async function fetchChunk(url, expectedBytes, onBytes) {
        const res = await fetch(url, { cache: "force-cache" });
        if (!res.ok) throw new Error(`Fetch failed (${res.status}) for ${url}`);
        if (!res.body) {
          const buf = await res.arrayBuffer();
          onBytes?.(buf.byteLength);
          return buf;
        }
        const reader = res.body.getReader();
        const chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.byteLength;
          onBytes?.(value.byteLength);
          await new Promise((r) => requestAnimationFrame(r));
        }
        const out = new Uint8Array(received);
        let offset = 0;
        for (const c of chunks) { out.set(c, offset); offset += c.byteLength; }
        return out.buffer;
      }

      function joinBuffers(buffers) {
        const total = buffers.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let offset = 0;
        for (const b of buffers) { out.set(new Uint8Array(b), offset); offset += b.byteLength; }
        return out.buffer;
      }

      async function downloadParallel(chunks, overall) {
        const buffers = new Array(chunks.length);
        await Promise.all(chunks.map((part, i) =>
          fetchChunk(part.url, part.bytes, (b) => {
            overall.bytesDone += b;
            setProgress((overall.bytesDone / overall.bytesTotal) * 100, "Downloading…");
          }).then((buf) => { buffers[i] = buf; })
        ));
        return joinBuffers(buffers);
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.async = true;
          s.onload = resolve;
          s.onerror = () => reject(new Error(`Failed to load script: ${src}`));
          document.head.appendChild(s);
        });
      }

      async function boot() {
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          const meta = document.createElement("meta");
          meta.name = "viewport";
          meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
          document.head.appendChild(meta);
        }

        const overall = {
          bytesDone: 0,
          bytesTotal:
            FILES.dataChunks.reduce((n, p) => n + p.bytes, 0) +
            FILES.wasmChunks.reduce((n, p) => n + p.bytes, 0),
        };

        setProgress(0, "Preparing downloads…");

        const [dataBuffer, wasmBuffer] = await Promise.all([
          downloadParallel(FILES.dataChunks, overall),
          downloadParallel(FILES.wasmChunks, overall),
        ]);

        setProgress(100, "Starting Unity…");

        const dataUrl = URL.createObjectURL(new Blob([dataBuffer]));
        const codeUrl = URL.createObjectURL(new Blob([wasmBuffer], { type: "application/wasm" }));

        await loadScript(FILES.loaderJs);

        const config = {
          dataUrl,
          frameworkUrl: FILES.frameworkJs,
          codeUrl,
          streamingAssetsUrl: ASSET_BASE_URL + "StreamingAssets",
          companyName: "DefaultCompany",
          productName: "Jeffrey Epstein Basics In Education And Kidnapping!",
          productVersion: "1.4.3",
        };

        const unityInstance = await createUnityInstance(canvas, config, (p) => {
          setProgress(Math.max(100, 100 * Math.max(0, Math.min(1, p))), "Initializing…");
        });

        loading.style.display = "none";
        fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);
      }

      boot().catch((err) => {
        console.error(err);
        showError(String(err?.message ?? err));
        loadingText.textContent = "Failed to load.";
      });
    </script>
  </body>
</html>
